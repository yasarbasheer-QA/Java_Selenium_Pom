name: Selenium CI

on:
  push:
    branches: [ "master" ]


  pull_request:
    branches: [ "master" ]

  workflow_dispatch:
  schedule:
   - cron: "30 21 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Tests
        run: mvn clean test -Denv=ci

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: ExtentReport
          path: Reports/