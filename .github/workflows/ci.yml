name: Selenium CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'murine'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Build & Run Tests
        run: mvn clean test

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: ExtentReport
          path: Reports/